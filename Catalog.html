<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Katalog Fashion - Lihat Semua Koleksi</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #f5f5f5;
      color: #333;
    }

    header {
      background: #222;
      color: white;
      padding: 20px 0;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      margin: 0;
      font-size: 28px;
    }

    nav {
      display: flex;
      gap: 30px;
    }

    nav a {
      color: white;
      text-decoration: none;
      transition: color 0.3s;
      font-weight: 500;
    }

    nav a:hover {
      color: #ff6b6b;
    }

    .hero {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      text-align: center;
      padding: 40px 20px;
    }

    .hero h2 {
      font-size: 32px;
      margin-bottom: 10px;
    }

    .catalog {
      display: flex;        
      gap: 20px;
      padding: 30px;
      overflow-x: auto;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      flex: 0 0 250px;        
      background: white;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0,0,0,0.1);
      overflow: hidden;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: 300px;
      object-fit: cover;
      display: block;
    }

    .card .info {
      padding: 15px;
      text-align: center;
    }

    .card h3 {
      margin: 10px 0 5px;
      font-size: 18px;
    }

    .card p {
      margin: 0;
      color: #777;
    }

    footer {
      text-align: center;
      background: #222;
      color: white;
      padding: 15px;
      margin-top: 40px;
    }

    @media (max-width: 768px) {
      .catalog {
        flex-wrap: wrap;
        justify-content: center;
      }

      .card {
        flex: 0 0 200px;
      }
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <h1>Fashion Store</h1>
      <nav>
        <a href="index.html">Beranda</a>
        <a href="products.html">Katalog Lengkap</a>
      </nav>
    </div>
  </header>

  <div class="hero">
    <h2>Koleksi Fashion Terbaru</h2>
    <p>Jelajahi semua pilihan fashion kami</p>
  </div>

  <section class="catalog">
    <div class="card">
      <img src="gambar1.jpg" alt="Retro Routine">
      <div class="info">
        <h3>Retro Routine</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar2.jpg" alt="coffe rhythm">
      <div class="info">
        <h3>coffe rhythm</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar3.jpg" alt="ash layered ease">
      <div class="info">
        <h3>ash layered ease</h3>
      </div>
    </div>

     <div class="card">
      <img src="gambar4.jpg" alt="vintage transit">
      <div class="info">
        <h3>Café Corner Fit</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar5.jpg" alt="Autumn Breeze">
      <div class="info">
        <h3>Autumn Breeze</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar6.jpg" alt="Grounded Neutrals">
      <div class="info">
        <h3>Grounded Neutrals</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar7.jpg" alt="Soft Street">
      <div class="info">
        <h3>Soft Street</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar8.jpg" alt="Urban Ease">
      <div class="info">
        <h3>Urban Ease</h3>
      </div>
    </div>

     <div class="card">
      <img src="gambar9.jpg" alt="muted timber">
      <div class="info">
        <h3>muted timber</h3>
      </div>
    </div>

    <div class="card">
      <img src="gambar10.jpg" alt="Everyday Frame">
      <div class="info">
        <h3>Everyday Frame</h3>
      </div>
    </div>
  </section>

  

  <footer>
    <p>&copy; 2025 Fashion Idea. All rights reserved.</p>
  </footer>
</body>
</html>
